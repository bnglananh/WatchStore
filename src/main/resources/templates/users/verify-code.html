<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xác nhận mã - Watch Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user-style.css}">
</head>

<body class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <a th:href="@{/user/products}" class="logo" style="color: #6366f1; font-size:1.8rem;">
                <i class="fas fa-clock"></i> WATCH STORE
            </a>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon" style="background: #10b981;">
                    <i class="fas fa-envelope-open-text"></i>
                </div>
                <h1>Xác nhận mã</h1>
                <p>Chúng tôi đã gửi mã xác nhận đến email của bạn</p>
                <strong th:text="${email}" style="color: #1e293b;"></strong>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/verify-code}" method="post">
                <input type="hidden" name="email" th:value="${email}">
                <div class="form-group">
                    <label for="code">
                        <i class="fas fa-shield-alt"></i> Mã xác nhận (6 chữ số)
                    </label>
                    <input type="text" id="code" name="code" placeholder="XXXXXX" pattern="[0-9]{6}" maxlength="6"
                        required autofocus
                        style="letter-spacing: 5px; text-align: center; font-size: 1.5rem; font-weight: 700;">
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-check-circle"></i> Xác nhận mã
                </button>
            </form>

            <div class="auth-footer">
                <p>Không nhận được mã? <a th:href="@{/forgot-password}">Gửi lại</a></p>
                <p>Quay lại <a th:href="@{/login}">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</body>

</html>
