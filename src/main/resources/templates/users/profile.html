<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/layout-user}">

<head>
    <title>Tài khoản của tôi</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-body: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.9);
        }

        .profile-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .profile-wrapper {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Styling */
        .profile-sidebar {
            background: white;
            border-radius: 24px;
            padding: 30px 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            border: 1px solid #f1f5f9;
            height: fit-content;
        }

        .user-avatar-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 1px solid #f1f5f9;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
            font-weight: 700;
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.2);
        }

        .user-info-brief h3 {
            margin: 0;
            color: var(--text-main);
            font-size: 1.25rem;
        }

        .user-info-brief p {
            margin: 5px 0 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .nav-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .nav-item {
            margin-bottom: 8px;
        }

        .nav-link-custom {
            display: flex;
            align-items: center;
            padding: 12px 18px;
            color: rgb(192, 0, 0);
            text-decoration: none;
            border-radius: 12px;
            transition: all 0.3s;
            font-weight: 500;
            cursor: pointer;
        }

        .nav-link-custom i {
            margin-right: 12px;
            font-size: 1.1rem;
            width: 20px;
            text-align: center;
        }

        .nav-link-custom:hover {
            background: #f1f5f9;
            color: var(--primary);
        }

        .nav-link-custom.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
        }

        /* Content Area */
        .profile-content-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.03);
            border: 1px solid #f1f5f9;
            min-height: 500px;
        }

        .section-header {
            margin-bottom: 30px;
        }

        .section-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 8px;
        }

        .section-header p {
            color: var(--text-muted);
            margin: 0;
        }

        /* Form Elements */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .input-group input:disabled {
            background-color: #f8fafc;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .btn-save {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(190, 27, 27, 0.94);
        }

        .error-msg {
            color: #ef4444;
            font-size: 0.85rem;
            margin-top: 5px;
            display: block;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Success/Error Alerts */
        .alert-custom {
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
        }

        .alert-success-custom {
            background: #f0fdf4;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert-error-custom {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>

<body>
    <div layout:fragment="content">
        <div class="profile-wrapper">
            <!-- Sidebar -->
            <aside class="profile-sidebar">
                <div class="user-avatar-section">
                    <div class="avatar-circle" th:text="${#strings.substring(user.fullName, 0, 1)}">U</div>
                    <div class="user-info-brief">
                        <h3 th:text="${user.fullName}">Họ Tên Người Dùng</h3>
                        <p th:text="${user.email}">user@example.com</p>
                    </div>
                </div>

                <nav class="nav-menu">
                    <div class="nav-item">
                        <a class="nav-link-custom active" onclick="switchTab('general', this)">
                            <i class="fas fa-user-circle"></i> Thông tin cá nhân
                        </a>
                    </div>
                    <div class="nav-item">
                        <a class="nav-link-custom" onclick="switchTab('security', this)">
                            <i class="fas fa-shield-alt"></i> Bảo mật & Mật khẩu
                        </a>
                    </div>
                    <div class="nav-item">
                        <a th:href="@{/order/history}" class="nav-link-custom">
                            <i class="fas fa-shopping-bag"></i> Lịch sử mua hàng
                        </a>
                    </div>
                    <div class="nav-item" style="margin-top: 20px;">
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="nav-link-custom"
                                style="width: 100%; border: none; background: none; text-align: left; color: #ef4444;">
                                <i class="fas fa-sign-out-alt"></i> Đăng xuất
                            </button>
                        </form>
                    </div>
                </nav>
            </aside>

            <!-- Main Content -->
            <main class="profile-content-card">
                <!-- Notifications -->
                <div th:if="${message}" class="alert-custom alert-success-custom">
                    <i class="fas fa-check-circle"></i>
                    <span th:text="${message}"></span>
                </div>

                <div th:if="${errors}" class="alert-custom alert-error-custom">
                    <div>
                        <div th:each="error : ${errors}">
                            <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span>
                        </div>
                    </div>
                </div>

                <!-- Tab 1: General Info -->
                <div id="tab-general" class="tab-content active">
                    <div class="section-header">
                        <h2>Thông tin cá nhân</h2>
                        <p>Cập nhật thông tin tài khoản và địa chỉ của bạn</p>
                    </div>

                    <form th:action="@{/profile/update}" method="post" th:object="${user}">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{username}">

                        <div class="form-grid">
                            <div class="input-group">
                                <label><i class="fas fa-id-badge"></i> Tên đăng nhập</label>
                                <input type="text" th:field="*{username}" disabled>
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-user"></i> Họ và tên</label>
                                <input type="text" th:field="*{fullName}" placeholder="Nhập họ tên" required>
                                <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"
                                    class="error-msg"></span>
                            </div>
                        </div>

                        <div class="form-grid">
                            <div class="input-group">
                                <label><i class="fas fa-envelope"></i> Email</label>
                                <input type="email" th:field="*{email}" placeholder="example@email.com" required>
                                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}"
                                    class="error-msg"></span>
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-phone"></i> Số điện thoại</label>
                                <input type="text" th:field="*{phone}" placeholder="0123456789">
                                <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"
                                    class="error-msg"></span>
                            </div>
                        </div>

                        <div class="input-group">
                            <label><i class="fas fa-map-marker-alt"></i> Địa chỉ nhận hàng</label>
                            <textarea th:field="*{address}" rows="3"
                                placeholder="Nhập địa chỉ đầy đủ của bạn..."></textarea>
                        </div>

                        <div style="margin-top: 30px;">
                            <button type="submit" class="btn-save">
                                <i class="fas fa-save"></i> Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Tab 2: Security -->
                <div id="tab-security" class="tab-content">
                    <div class="section-header">
                        <h2>Bảo mật & Mật khẩu</h2>
                        <p>Đổi mật khẩu định kỳ để bảo vệ tài khoản của bạn</p>
                    </div>

                    <form th:action="@{/profile/change-password}" method="post" th:object="${passwordChangeRequest}">
                        <div class="input-group">
                            <label><i class="fas fa-lock"></i> Mật khẩu hiện tại</label>
                            <input type="password" th:field="*{currentPassword}" placeholder="••••••••" required>
                            <span th:if="${#fields.hasErrors('currentPassword')}" th:errors="*{currentPassword}"
                                class="error-msg"></span>
                        </div>

                        <div class="form-grid">
                            <div class="input-group">
                                <label><i class="fas fa-key"></i> Mật khẩu mới</label>
                                <input type="password" th:field="*{newPassword}" placeholder="••••••••" required>
                                <span th:if="${#fields.hasErrors('newPassword')}" th:errors="*{newPassword}"
                                    class="error-msg"></span>
                            </div>
                            <div class="input-group">
                                <label><i class="fas fa-check-double"></i> Xác nhận mật khẩu mới</label>
                                <input type="password" th:field="*{confirmPassword}" placeholder="••••••••" required>
                                <span th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"
                                    class="error-msg"></span>
                            </div>
                        </div>

                        <div style="margin-top: 30px;">
                            <button type="submit" class="btn-save" style="background: #1e293b;">
                                <i class="fas fa-shield-alt"></i> Cập nhật mật khẩu
                            </button>
                        </div>
                    </form>
                </div>
            </main>
        </div>

        <script>
            function switchTab(tabName, element) {
                // Hide all tabs
                document.querySelectorAll('.tab-content').forEach(tab => {
                    tab.classList.remove('active');
                });

                // Deactivate all nav links
                document.querySelectorAll('.nav-link-custom').forEach(link => {
                    link.classList.remove('active');
                });

                // Show selected tab
                document.getElementById('tab-' + tabName).classList.add('active');

                // Activate selected link
                element.classList.add('active');

                // Save tab to localStorage to persist after reload
                localStorage.setItem('activeProfileTab', tabName);
            }

            // Persistence logic
            window.addEventListener('DOMContentLoaded', () => {
                const activeTab = localStorage.getItem('activeProfileTab') || 'general';
                const link = document.querySelector(`.nav-link-custom[onclick*="${activeTab}"]`);
                if (link) switchTab(activeTab, link);

                // If there are errors in password form, auto switch to security tab
                const passwordErrors = document.querySelectorAll('#tab-security .error-msg').length > 0;
                if (passwordErrors) {
                    const securityLink = document.querySelector('.nav-link-custom[onclick*="security"]');
                    if (securityLink) switchTab('security', securityLink);
                }
            });
        </script>
    </div>
</body>

</html>
