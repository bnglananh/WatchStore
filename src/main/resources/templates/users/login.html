<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Watch Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user-style.css}">
</head>

<body class="auth-page">

    <div class="auth-container">
        <div class="auth-brand">
            <a th:href="@{/user/products}" class="logo" style="color: #6366f1; font-size:1.8rem;">
                <i class="fas fa-clock"></i> WATCH STORE
            </a>
            <p style="color: rgba(37, 37, 37, 0.8); margin-top: 0.5rem; font-size: 0.95rem;">
                Đồng hồ cao cấp chính hãng
            </p>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-sign-in-alt"></i>
                </div>
                <h1>Đăng nhập</h1>
                <p>Chào mừng bạn quay lại!</p>
            </div>

            <!-- Error message -->
            <div th:if="${param.error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                Tên đăng nhập hoặc mật khẩu không đúng.
            </div>

            <!-- Logout message -->
            <div th:if="${param.logout}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                Bạn đã đăng xuất thành công.
            </div>

            <form th:action="@{/login}" method="post">

                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Tên đăng nhập
                    </label>
                    <input type="text" id="username" name="username" placeholder="Nhập tên đăng nhập" required
                        autofocus>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Mật khẩu
                    </label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
                        <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-check" style="display:flex; justify-content:space-between; align-items:center;">
                    <label>
                        <input type="checkbox" name="remember-me"> Ghi nhớ
                    </label>
                    <a th:href="@{/forgot-password}" style="font-size:0.85rem; color:var(--primary); text-decoration:none;">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-sign-in-alt"></i> Đăng nhập
                </button>

                <div class="social-login" style="margin-top:20px; text-align:center;">
                    <div style="display:flex; align-items:center; margin-bottom:15px;">
                        <div style="flex:1; height:1px; background:#eee;"></div>
                        <span style="padding:0 15px; font-size:0.8rem; color:#888;">Hoặc đăng nhập với</span>
                        <div style="flex:1; height:1px; background:#eee;"></div>
                    </div>
                    <div style="display:flex; gap:10px;">
                        <a href="/oauth2/authorization/google" class="btn-outline" style="flex:1; text-decoration:none; padding:10px; display:flex; align-items:center; justify-content:center; gap:8px;">
                            <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="18" height="18"> Google
                        </a>
                        <a href="/oauth2/authorization/facebook" class="btn-outline" style="flex:1; text-decoration:none; padding:10px; display:flex; align-items:center; justify-content:center; gap:8px;">
                            <i class="fab fa-facebook" style="color:#1877f2; font-size:1.1rem;"></i> Facebook
                        </a>
                    </div>
                </div>
            </form>

            <div class="auth-footer">
                <p>Chưa có tài khoản?
                    <a th:href="@{/register}">Đăng ký ngay</a>
                </p>
                <a th:href="@{/user/products}" class="back-link">
                    <i class="fas fa-arrow-left"></i> Tiếp tục mua sắm không cần đăng nhập
                </a>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            if (!t) return;
            let icon = 'fa-check-circle';
            if (type === 'error') icon = 'fa-exclamation-circle';
            t.innerHTML = `<i class="fas ${icon}"></i> <span>${msg}</span>`;
            t.className = `toast ${type} show`;
            setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('error')) showToast('Tên đăng nhập hoặc mật khẩu không đúng.', 'error');
            if (urlParams.has('logout')) showToast('Bạn đã đăng xuất thành công.');
            if (urlParams.has('resetSuccess')) showToast('Đặt lại mật khẩu thành công!');
        });
    </script>
</body>

</html>
