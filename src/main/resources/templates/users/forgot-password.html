<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Watch Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user-style.css}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <a th:href="@{/user/products}" class="logo" style="color: #6366f1; font-size:1.8rem;">
                <i class="fas fa-clock"></i> WATCH STORE
            </a>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon" style="background: #fbbf24;">
                    <i class="fas fa-key"></i>
                </div>
                <h1>Quên mật khẩu</h1>
                <p>Nhập <b>Tên đăng nhập</b> để đổi trực tiếp<br>hoặc <b>Email</b> để nhận mã xác nhận</p>
            </div>

            <div th:if="${message}" class="alert alert-success">
                <i class="fas fa-check-circle"></i>
                <span th:text="${message}"></span>
            </div>

            <div th:if="${error}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <span th:text="${error}"></span>
            </div>

            <form th:action="@{/forgot-password}" method="post">
                <div class="form-group">
                    <label for="identifier">
                        <i class="fas fa-user-tag"></i> Email hoặc Tên đăng nhập
                    </label>
                    <input type="text" id="identifier" name="identifier" placeholder="Nhập email hoặc tên đăng nhập" required autofocus>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-paper-plane"></i> Gửi yêu cầu
                </button>
            </form>

            <div class="auth-footer">
                <p>Quay lại <a th:href="@{/login}">Đăng nhập</a></p>
            </div>
        </div>
    </div>
</body>
</html>
