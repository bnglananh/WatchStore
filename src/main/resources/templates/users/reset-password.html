<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt lại mật khẩu - Watch Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user-style.css}">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-brand">
            <a th:href="@{/user/products}" class="logo" style="color: #6366f1; font-size:1.8rem;">
                <i class="fas fa-clock"></i> WATCH STORE
            </a>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon" style="background: #10b981;">
                    <i class="fas fa-lock-open"></i>
                </div>
                <h1>Đặt lại mật khẩu</h1>
                <p>Vui lòng nhập mật khẩu mới của bạn</p>
            </div>

            <form th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}">
                <input type="hidden" name="email" th:value="${email}">
                
                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Mật khẩu mới
                    </label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" placeholder="Tối thiểu 6 ký tự" required minlength="6">
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">
                        <i class="fas fa-shield-alt"></i> Xác nhận mật khẩu
                    </label>
                    <div class="password-field">
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-check-double"></i> Cập nhật mật khẩu
                </button>
            </form>

            <script>
                document.querySelector('form').addEventListener('submit', function(e) {
                    const pass = document.getElementById('password').value;
                    const confirm = document.getElementById('confirmPassword').value;
                    if (pass !== confirm) {
                        e.preventDefault();
                        alert('Mật khẩu xác nhận không khớp!');
                    }
                });
            </script>
        </div>
    </div>
</body>
</html>
