<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Watch Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/user-style.css}">
</head>

<body class="auth-page">

    <div class="auth-container">
        <div class="auth-brand">
            <a th:href="@{/user/products}" class="logo" style="color: #6366f1; font-size:1.8rem;">
                <i class="fas fa-clock"></i> WATCH STORE
            </a>
            <p style="color: rgba(37, 37, 37, 0.8); margin-top: 0.5rem; font-size: 0.95rem;">
                Tạo tài khoản để mua sắm dễ dàng hơn
            </p>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon">
                    <i class="fas fa-user-plus"></i>
                </div>
                <h1>Đăng ký tài khoản</h1>
                <p>Tham gia cùng hàng nghìn khách hàng của chúng tôi</p>
            </div>

            <!-- Validation errors -->
            <div th:if="${errors}" class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                <ul style="margin: 0.5rem 0 0 1.2rem; padding: 0;">
                    <li th:each="error : ${errors}" th:text="${error}"></li>
                </ul>
            </div>

            <form th:action="@{/register}" method="post" th:object="${user}">
                
                <div class="form-group">
                    <label for="fullName">
                        <i class="fas fa-id-card"></i> Họ và tên
                    </label>
                    <input type="text" id="fullName" name="fullName" th:field="*{fullName}"
                        placeholder="Nhập họ và tên của bạn" required>
                </div>

                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Tên đăng nhập
                    </label>
                    <input type="text" id="username" name="username" th:value="*{username}"
                        placeholder="Nhập tên đăng nhập (3-50 ký tự)" required>
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" th:value="*{email}" placeholder="your@email.com"
                        required>
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Mật khẩu
                    </label>
                    <div class="password-field">
                        <input type="password" id="password" name="password" placeholder="Ít nhất 6 ký tự" required>
                        <button type="button" class="toggle-pw" onclick="togglePassword('password', this)">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fas fa-user-plus"></i> Tạo tài khoản
                </button>
            </form>

            <div class="auth-footer">
                <p>Đã có tài khoản?
                    <a th:href="@{/login}">Đăng nhập ngay</a>
                </p>
                <a th:href="@{/user/products}" class="back-link">
                    <i class="fas fa-arrow-left"></i> Tiếp tục mua sắm không cần đăng ký
                </a>
            </div>
        </div>
    </div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            const icon = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>

</html>
