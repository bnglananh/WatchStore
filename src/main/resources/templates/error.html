<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout-user}">
<head>
    <title>Lỗi - WATCH</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container" style="max-width: 600px; margin-top: 80px; margin-bottom: 100px; text-align: center;">
        <div style="background: white; padding: 50px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9;">
            <div style="font-size: 80px; color: #ef4444; margin-bottom: 20px;">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1 style="font-weight: 700; color: #1e293b; margin-bottom: 15px;">Rất tiếc! Đã xảy ra lỗi</h1>
            <p style="color: #64748b; font-size: 1.1rem; margin-bottom: 30px;" th:text="${errorMessage != null ? errorMessage : 'Chúng tôi không thể xử lý yêu cầu của bạn vào lúc này.'}">
                Lỗi không xác định.
            </p>
            <div style="display: flex; gap: 15px; justify-content: center;">
                <a th:href="@{/}" class="btn-checkout" style="width: 180px; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 12px; border-radius: 12px; font-weight: 600;">
                    <i class="fas fa-home" style="margin-right: 8px;"></i> Về Trang Chủ
                </a>
                <a href="javascript:history.back()" class="btn-outline" style="width: 180px; text-decoration: none; display: flex; align-items: center; justify-content: center; border-radius: 12px; font-weight: 600; border: 1px solid #e2e8f0; color: #64748b; background: #f8fafc;">
                    <i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Quay Lại
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
