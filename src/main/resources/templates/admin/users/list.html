<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout-admin}">
<head><title>Quản lý người dùng</title></head>
<body>
<div layout:fragment="content">
    <div class="topbar">
        <h1>Quản lý người dùng</h1>
        <div class="badge" th:text="${users.size()} + ' người dùng'">0 người dùng</div>
    </div>

    <div th:if="${message}" class="alert alert-success" style="background-color: #d1fae5; color: #065f46; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid #10b981;" th:text="${message}"></div>
    <div th:if="${error}" class="alert alert-danger" style="background-color: #fee2e2; color: #991b1b; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border-left: 4px solid #ef4444;" th:text="${error}"></div>

    <div class="card">
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Vai trò</th>
                        <th style="width: 140px; text-align: center;">Trạng thái</th>
                        <th style="width: 180px; text-align: center;">Hành động</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td style="font-weight: 600;" th:text="${user.username}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span th:each="role : ${user.roles}"
                                  th:text="${role.name}"
                                  class="category-badge" style="margin-right:5px; font-size: 0.75rem;"></span>
                        </td>
                        <td style="text-align: center;">
                            <span th:if="${user.enabled}" class="badge success">Hoạt động</span>
                            <span th:if="${!user.enabled}" class="badge danger">Đang khóa</span>
                        </td>
                        <td>
                            <div class="actions" style="justify-content: center;" th:if="${!#lists.contains(user.roles.![name], 'ROLE_ADMIN')}">
                                <form th:action="@{/admin/users/toggle/{id}(id=${user.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-sm" th:classappend="${user.enabled} ? 'delete' : 'edit'" style="border:none; cursor:pointer;">
                                        <i class="fas" th:classappend="${user.enabled} ? 'fa-user-slash' : 'fa-user-check'"></i>
                                    </button>
                                </form>
                                <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post" style="display:inline;">
                                    <button type="submit" class="btn btn-secondary btn-sm" style="border:none; cursor:pointer;" onclick="return confirm('Bạn có chắc chắn muốn xóa người dùng này?')">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </form>
                            </div>
                            <span th:if="${#lists.contains(user.roles.![name], 'ROLE_ADMIN')}" style="color: #999; font-style: italic;">Protected</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
