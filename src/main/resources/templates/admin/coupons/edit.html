<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/layout-admin}">
<head>
    <title>Chỉnh sửa Mã giảm giá</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="topbar">
            <h1>Chỉnh sửa Mã giảm giá</h1>
            <div class="badge" th:text="${coupon.code}">Code</div>
        </div>

        <div class="card" style="max-width: 800px; margin: 0 auto;">
            <h2>Cập nhật thông tin</h2>
            <form th:action="@{/admin/coupons/save}" method="post" th:object="${coupon}">
                <input type="hidden" th:field="*{id}" />
                
                <div class="form-group">
                    <label>Mã giảm giá (Code)</label>
                    <input type="text" th:field="*{code}" required style="text-transform: uppercase;">
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="form-group">
                        <label>Loại giảm giá</label>
                        <select th:field="*{discountType}" required>
                            <option value="PERCENTAGE">Phần trăm (%)</option>
                            <option value="FIXED">Số tiền cố định (VNĐ)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Giá trị giảm</label>
                        <input type="number" step="0.01" th:field="*{discountValue}" required>
                    </div>
                </div>

                <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
                    <div class="form-group">
                        <label>Đơn hàng tối thiểu (VNĐ)</label>
                        <input type="number" th:field="*{minOrderAmount}">
                    </div>
                    <div class="form-group">
                        <label>Ngày hết hạn</label>
                        <input type="date" th:field="*{expirationDate}">
                    </div>
                </div>

                <div class="form-group">
                    <label style="display:inline-flex; align-items:center; cursor:pointer; gap:10px;">
                        <input type="checkbox" th:field="*{active}" style="width:20px;"> Kích hoạt mã này
                    </label>
                </div>

                <div class="actions mt">
                    <button type="submit" class="btn btn-primary">Cập nhật mã</button>
                    <a th:href="@{/admin/coupons}" class="btn btn-secondary">Quay lại</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
