<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layouts/layout-admin}">

<head>
    <title>Danh sách sản phẩm</title>
</head>

<body>
    <div layout:fragment="content">
        <div class="topbar">
            <h1>Danh sách đồng hồ</h1>
            <a th:href="@{/admin/products/add}" class="btn btn-add">+ Thêm sản phẩm</a>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 80px;">Ảnh</th>
                            <th>Tên sản phẩm</th>
                            <th style="width: 180px;">Giá bán</th>
                            <th style="width: 120px; text-align: center;">Tồn kho</th>
                            <th style="width: 180px; text-align: center;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p:${products}">
                            <td><img th:src="@{'/images/'+${p.image}}" class="product-img" onerror="this.src='/images/no-image.png'"></td>
                            <td>
                                <div style="font-weight: 600; color: var(--text);">[[${p.name}]]</div>
                                <span class="category-badge" style="font-size: 0.75rem;" th:text="${p.category.name}"></span>
                                <span th:if="${p.featured}" class="badge info" style="font-size: 0.7rem; padding: 2px 8px; margin-left: 5px;">Nổi bật</span>
                            </td>
                            <td>
                                <div th:if="${p.discountPrice != null && p.discountPrice > 0}">
                                    <div style="color:#ff4757; font-weight:bold; font-size: 1.05rem;" th:text="${#numbers.formatDecimal(p.discountPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></div>
                                    <small style="text-decoration:line-through; opacity:0.5;" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></small>
                                </div>
                                <div th:unless="${p.discountPrice != null && p.discountPrice > 0}">
                                    <span style="font-weight: 500;" th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                                </div>
                            </td>
                            <td style="text-align: center;">
                                <span th:class="${p.stock < 10} ? 'badge danger' : 'badge success'" 
                                      th:text="${p.stock}"></span>
                            </td>
                            <td>
                                <div class="actions" style="justify-content: center;">
                                    <a th:href="@{/admin/products/edit/{id}(id=${p.id})}" class="btn edit btn-sm">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form th:action="@{/admin/products/delete/{id}(id=${p.id})}" method="post" style="display:inline;">
                                        <button type="submit" class="btn delete btn-sm" style="border:none; cursor:pointer;" onclick="return confirm('Bạn muốn xóa sản phẩm này?')">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
