<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layouts/layout-admin}">
<head>
    <title>Cập nhật sản phẩm</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="topbar">
            <h1>Cập nhật sản phẩm</h1>
            <div class="badge">Edit Mode</div>
        </div>

        <div class="card">
            <h2><i class="fas fa-edit"></i> Chỉnh sửa thông tin đồng hồ</h2>
            <form th:action="@{/admin/products/save}" method="post" enctype="multipart/form-data" th:object="${product}">
                <input type="hidden" th:field="*{id}"/>

                <div class="form-group">
                    <label><i class="fas fa-watch"></i> Tên đồng hồ</label>
                    <input type="text" th:field="*{name}" class="form-control" required>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label><i class="fas fa-copyright"></i> Thương hiệu</label>
                        <select th:field="*{brand}" class="form-control" required>
                            <option value="">-- Chọn thương hiệu --</option>
                            <option value="Seiko">Seiko</option>
                            <option value="Casio">Casio</option>
                            <option value="Citizen">Citizen</option>
                            <option value="Orient">Orient</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-shield-alt"></i> Bảo hành</label>
                        <input type="text" th:field="*{warranty}" class="form-control" placeholder="Ví dụ: 12 tháng, 2 năm">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tools"></i> Chất liệu</label>
                    <input type="text" th:field="*{material}" class="form-control" placeholder="Ví dụ: Thép không gỉ, Dây da">
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Danh mục</label>
                        <select th:field="*{category.id}" class="form-control" required>
                            <option th:each="c:${categories}" th:value="${c.id}" th:text="${c.name}"></option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-cubes"></i> Số lượng tồn</label>
                        <input type="number" th:field="*{stock}" class="form-control" required min="0">
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label><i class="fas fa-money-bill-wave"></i> Giá bán (VNĐ)</label>
                        <input type="number" th:field="*{price}" class="form-control" required min="0">
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-percentage"></i> Giá khuyến mãi (nếu có)</label>
                        <input type="number" th:field="*{discountPrice}" class="form-control" min="0">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Mô tả sản phẩm</label>
                    <textarea th:field="*{description}" class="form-control"></textarea>
                </div>

                <div class="form-group">
                    <label style="display:inline-flex; align-items:center; cursor:pointer; gap:12px; background: #f8fafc; padding: 12px 20px; border-radius: 12px; border: 1px solid var(--border);">
                        <input type="checkbox" th:field="*{featured}" style="width:20px; height:20px; cursor:pointer;"> 
                        <span style="font-weight: 600;">Sản phẩm nổi bật</span>
                    </label>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-images"></i> Album hình ảnh sản phẩm</label>
                    
                    <!-- Existing Gallery -->
                    <div th:if="${not #lists.isEmpty(product.images)}" style="margin-bottom: 20px;">
                        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 10px;">Hình ảnh hiện tại:</p>
                        <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px;">
                            <div th:each="img : ${product.images}" style="position:relative; border-radius:10px; overflow:hidden; aspect-ratio:1/1; border: 1px solid #e2e8f0;">
                                <img th:src="@{'/images/' + ${img.url}}" style="width:100%; height:100%; object-fit:cover;">
                            </div>
                        </div>
                    </div>

                    <!-- Upload New -->
                    <div class="file-box" onclick="document.getElementById('imageFiles').click()" style="border: 2px dashed #cbd5e1; background: #f8fafc;">
                        <div id="upload-placeholder">
                            <i class="fas fa-plus-circle" style="font-size: 2rem; color: var(--primary); margin-bottom: 1rem;"></i>
                            <p style="font-size: 0.9rem;">Thêm hình ảnh mới (Chọn nhiều)</p>
                        </div>
                        <input type="file" id="imageFiles" name="imageFiles" accept="image/*" multiple onchange="previewImages(event)" style="display:none;">
                        
                        <div id="image-preview-container" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; width: 100%;">
                            <!-- New previews will be injected here -->
                        </div>
                    </div>
                </div>

                <div class="actions mt">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Cập nhật sản phẩm
                    </button>
                    <a th:href="@{/admin/products}" class="btn btn-secondary">
                        <i class="fas fa-times"></i> Hủy bỏ
                    </a>
                </div>
            </form>
        </div>

        <script>
            function previewImages(event) {
                const container = document.getElementById('image-preview-container');
                const placeholder = document.getElementById('upload-placeholder');
                container.innerHTML = '';
                
                if (event.target.files.length > 0) {
                    placeholder.style.display = 'none';
                    Array.from(event.target.files).forEach(file => {
                        const reader = new FileReader();
                        reader.onload = function(e) {
                            const wrapper = document.createElement('div');
                            wrapper.style.borderRadius = '10px';
                            wrapper.style.overflow = 'hidden';
                            wrapper.style.aspectRatio = '1/1';
                            wrapper.style.boxShadow = '0 2px 8px rgba(0,0,0,0.1)';
                            wrapper.style.border = '2px solid var(--primary)';

                            const img = document.createElement('img');
                            img.src = e.target.result;
                            img.style.width = '100%';
                            img.style.height = '100%';
                            img.style.objectFit = 'cover';

                            wrapper.appendChild(img);
                            container.appendChild(wrapper);
                        }
                        reader.readAsDataURL(file);
                    });
                } else {
                    placeholder.style.display = 'block';
                }
            }
        </script>
    </div>
</body>
</html>
