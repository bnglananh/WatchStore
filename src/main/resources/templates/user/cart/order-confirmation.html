<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout-user}">
<head><title>Đặt hàng thành công</title></head>
<body>
<div layout:fragment="content">
    <div class="container fade-in" style="max-width:700px;">
        <div class="confirmation-card">
            <div class="success-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h1>Đặt hàng thành công!</h1>
            <p class="success-msg">Cảm ơn bạn đã tin tưởng Watch Store.<br>Đơn hàng của bạn đang được xử lý và sẽ sớm được giao.</p>

            <div class="order-detail-box">
                <h3>Chi tiết đơn hàng <span class="order-id">#<span th:text="${order.id}">ID</span></span></h3>
                <div class="order-detail-row">
                    <span><i class="fas fa-user"></i> Người nhận:</span>
                    <strong th:text="${order.customerName}">Tên</strong>
                </div>
                <div class="order-detail-row">
                    <span><i class="fas fa-phone"></i> Số điện thoại:</span>
                    <strong th:text="${order.phoneNumber}">Phone</strong>
                </div>
                <div class="order-detail-row">
                    <span><i class="fas fa-map-marker-alt"></i> Địa chỉ:</span>
                    <strong th:text="${order.shippingAddress}">Address</strong>
                </div>
                <div class="order-detail-row">
                    <span><i class="fas fa-credit-card"></i> Thanh toán:</span>
                    <strong th:text="${order.paymentMethod}">Method</strong>
                </div>
                <div class="order-detail-row">
                    <span><i class="fas fa-info-circle"></i> Trạng thái:</span>
                    <span class="status-badge pending" th:text="${order.status}">Pending</span>
                </div>
            </div>

            <div class="confirmation-actions">
                <a th:href="@{/user/products}" class="btn-checkout" style="text-decoration:none;display:inline-flex;gap:0.5rem;align-items:center;">
                    <i class="fas fa-shopping-bag"></i> Tiếp tục mua sắm
                </a>
                <a th:href="@{/order/history}" class="btn-outline" style="text-decoration:none;display:inline-flex;gap:0.5rem;align-items:center;">
                    <i class="fas fa-history"></i> Xem đơn hàng
                </a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
